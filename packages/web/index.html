<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABG — Acoustic But Goated</title>
    <link rel="icon" href="/favicon/Favicon_Grey.png" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon/Favicon_Cream.png" media="(prefers-color-scheme: dark)" />
    <script>
      function setFavicon() {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const favicon = document.querySelector('link[rel="icon"]')
        if (favicon) {
          favicon.href = isDark ? '/favicon/Favicon_Cream.png' : '/favicon/Favicon_Grey.png'
        }
      }
      setFavicon()
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', setFavicon)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
