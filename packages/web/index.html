<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ABG</title>
    <link rel="icon" href="/favicon/Favicon_Grey.svg" type="image/svg+xml" media="(prefers-color-scheme: light)" />
    <link rel="icon" href="/favicon/Favicon_Cream.svg" type="image/svg+xml" media="(prefers-color-scheme: dark)" />
    <link rel="icon" href="/favicon/Favicon_Grey.svg" type="image/svg+xml" />
    <script>
      function setFavicon() {
        const isDark = window.matchMedia('(prefers-color-scheme: dark)').matches
        const href = isDark ? '/favicon/Favicon_Cream.svg' : '/favicon/Favicon_Grey.svg'
        document.querySelectorAll('link[rel="icon"]').forEach((el) => {
          if (!el.media) el.href = href
        })
      }
      setFavicon()
      window.matchMedia('(prefers-color-scheme: dark)').addEventListener('change', setFavicon)
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
